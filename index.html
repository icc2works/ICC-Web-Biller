<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Indian CNC Carving</title>
  <meta name="description" content="Indian CNC Carving billing home page with quick access to new bills and reports.">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="no-sidebar simple-home">

  <main class="home-shell">
    <header class="home-header">
      <a class="home-brand" href="index.html" aria-label="Indian CNC Carving home">
        <span class="home-logo">ICC</span>
        <span>
          <strong>Indian CNC Carving</strong>
          <small>Billing System</small>
        </span>
      </a>

      <nav class="home-menu" aria-label="Main menu">
        <a href="customers.html" class="home-menu-btn" title="Customers">
          <span class="menu-icon customer-icon" aria-hidden="true"></span>
          <span>Customer</span>
        </a>
        <a href="settings.html" class="home-menu-btn" title="Settings">
          <span class="menu-icon settings-icon" aria-hidden="true"></span>
          <span>Settings</span>
        </a>
        <a href="admin.html" class="home-menu-btn" title="Admin">
          <span class="menu-icon admin-icon" aria-hidden="true"></span>
          <span>Admin</span>
        </a>
      </nav>
    </header>

    <section class="home-main" aria-labelledby="homeTitle">
      <div class="home-title-group">
        <div class="section-label">Welcome</div>
        <h1 id="homeTitle">Choose an option</h1>
        <p>Start a new bill or manage your business.</p>
      </div>

      <div class="home-actions" aria-label="Primary actions">
        <a href="create-bill.html" class="home-action primary-action">
          <span class="action-icon bill-action-icon" aria-hidden="true"></span>
          <span>
            <strong>New Bill</strong>
            <small>Create customer invoice</small>
          </span>
        </a>

        <a href="reports.html" class="home-action secondary-action">
          <span class="action-icon report-action-icon" aria-hidden="true"></span>
          <span>
            <strong>View Report</strong>
            <small>View sales and bills</small>
          </span>
        </a>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>

</html>
