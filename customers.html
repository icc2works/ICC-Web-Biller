<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers — Indian CNC Carving</title>
  <meta name="description" content="Manage your CNC customer database — add, edit, and view billing history.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <div class="brand-icon">⚙️</div>
    <div>
      <div class="brand-name">Indian CNC Carving</div>
      <span class="brand-sub">Billing System</span>
    </div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">🏠 Dashboard</a></li>
    <li><a href="create-bill.html">🧾 New Bill</a></li>
    <li><a href="customers.html" class="active">👥 Customers</a></li>
    <li><a href="reports.html">📊 Reports</a></li>
    <li><a href="settings.html">⚙️ Settings</a></li>
  </ul>
  <div id="navClock" class="nav-date">Loading…</div>
</nav>

<div class="container">

  <div class="page-header flex-between">
    <div>
      <div class="section-label">Directory</div>
      <h1 class="page-title">Customers</h1>
      <p class="page-subtitle"><span id="customerCount">0</span> customers in your database</p>
    </div>
    <button class="btn btn-primary btn-lg" onclick="openModal('addCustomerModal')">
      ➕ Add Customer
    </button>
  </div>

  <!-- Search -->
  <div class="search-bar mb-24">
    <div class="search-input-wrap" style="flex:1;">
      <input type="text" id="customerSearch" placeholder="Search by name, phone, or address…" autocomplete="off">
    </div>
    <button class="btn btn-secondary" onclick="exportCustomers()">📥 Export</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Customer</th>
          <th>Phone</th>
          <th>Added On</th>
          <th>Bills</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="customerTableBody">
        <tr><td colspan="5">
          <div class="empty-state">
            <span class="empty-icon">👥</span>
            <p>No customers yet. Add your first customer!</p>
          </div>
        </td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- Add / Edit Customer Modal -->
<div class="modal-overlay" id="addCustomerModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">👤 Customer Details</div>
      <button class="modal-close" onclick="closeModal('addCustomerModal');clearCustomerForm();">✕</button>
    </div>
    <input type="hidden" id="editCustomerId">
    <div class="grid-2">
      <div class="form-group">
        <label for="custName">Full Name *</label>
        <input type="text" id="custName" placeholder="Enter full name" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="custPhone">Phone Number</label>
        <input type="tel" id="custPhone" placeholder="+91 00000 00000">
      </div>
    </div>
    <div class="form-group">
      <label for="custAddress">Address / Area</label>
      <input type="text" id="custAddress" placeholder="City, Street, Area…">
    </div>
    <div class="form-group">
      <label for="custEmail">Email (optional)</label>
      <input type="email" id="custEmail" placeholder="customer@email.com">
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-secondary" style="flex:1;"
        onclick="closeModal('addCustomerModal');clearCustomerForm();">Cancel</button>
      <button class="btn btn-primary" style="flex:1;" id="saveCustomerBtn" onclick="saveCustomer()">✅ Save Customer</button>
    </div>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script src="js/customers.js"></script>
<script>
  function exportCustomers() {
    const data = Storage.getCustomers();
    const csv  = 'Name,Phone,Address,Email,Added On\n' +
      data.map(c => `"${c.name}","${c.phone||''}","${c.address||''}","${c.email||''}","${formatDate(c.createdAt)}"`).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'customers.csv'; a.click();
    showToast('Customers exported!', 'success');
  }
</script>
</body>
</html>
